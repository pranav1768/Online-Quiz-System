<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz System — Take Quiz</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <h1>Quiz<span>System</span></h1>
  <div class="navbar-links" id="navbar-user"></div>
</nav>

<div class="container" style="max-width:700px">

  <!-- Loading -->
  <div id="loading" class="spinner-wrap"><div class="spinner"></div></div>

  <!-- Quiz Area (hidden until loaded) -->
  <div id="quiz-area" class="hidden">

    <h2 id="quiz-title" style="margin-bottom:5px"></h2>
    <p id="quiz-desc" style="color:#666;margin-bottom:20px;font-size:0.9rem"></p>

    <!-- Timer -->
    <div class="timer-bar"><div id="timer-fill" class="timer-fill" style="width:100%"></div></div>
    <div id="timer-display" class="timer-display">00:00</div>

    <!-- Progress text -->
    <p style="text-align:center;color:#888;font-size:0.85rem;margin-bottom:20px">
      Question <span id="current-num">1</span> of <span id="total-num">0</span>
      &nbsp;|&nbsp; <span id="answered-count">0</span> answered
    </p>

    <!-- Question Card -->
    <div id="question-box" class="question-box">
      <p class="question-num" id="question-num">Question 1</p>
      <p class="question-text" id="question-text"></p>
      <div id="options-list"></div>
    </div>

    <!-- Navigation Buttons -->
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn btn-gray"  id="btn-prev" onclick="prevQuestion()">← Previous</button>
      <button class="btn btn-blue"  id="btn-next" onclick="nextQuestion()">Next →</button>
      <button class="btn btn-green hidden" id="btn-submit" onclick="submitQuiz()">Submit Quiz ✓</button>
    </div>

  </div>

</div>

<!-- Confirm Submit Popup -->
<div id="confirm-box" class="hidden" style="
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;z-index:999
">
  <div class="card" style="max-width:400px;width:90%">
    <h3 style="margin-bottom:10px">Submit Quiz?</h3>
    <p id="confirm-msg" style="color:#666;margin-bottom:20px;font-size:0.9rem"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-gray"  onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-green" onclick="confirmSubmit()">Yes, Submit</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  requireLogin();
  fillNavbar();

  // Get quiz ID from URL
  const quizId    = new URLSearchParams(location.search).get('id');
  if (!quizId) location.href = 'dashboard.html';

  let questions   = [];    // all questions
  let currentIdx  = 0;     // which question we're on
  let answers     = {};    // { questionId: 'A', questionId: 'B', ... }
  let totalSeconds;        // total timer seconds
  let timerInterval;

  // ── Load quiz and questions ───────────────────────────────
  async function loadQuiz() {
    const { ok, data } = await GET(`/quizzes/${quizId}/questions`);
    document.getElementById('loading').classList.add('hidden');

    if (!ok) { alert('Could not load quiz.'); location.href = 'dashboard.html'; return; }

    questions = data.questions;
    const quiz = data.quiz;

    document.getElementById('quiz-title').textContent = quiz.title;
    document.getElementById('quiz-desc').textContent  = quiz.description || '';
    document.getElementById('total-num').textContent  = questions.length;

    startTimer(quiz.time_limit);
    showQuestion(0);
    document.getElementById('quiz-area').classList.remove('hidden');
  }

  // ── Show a question ───────────────────────────────────────
  function showQuestion(index) {
    const q = questions[index];
    currentIdx = index;

    document.getElementById('question-num').textContent  = `Question ${index + 1} of ${questions.length}`;
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('current-num').textContent   = index + 1;
    document.getElementById('answered-count').textContent = Object.keys(answers).length;

    // Show/hide navigation buttons
    document.getElementById('btn-prev').style.display   = index === 0 ? 'none' : '';
    document.getElementById('btn-next').classList.toggle('hidden', index === questions.length - 1);
    document.getElementById('btn-submit').classList.toggle('hidden', index !== questions.length - 1);

    // Build options A, B, C, D
    const optionLabels = ['A', 'B', 'C', 'D'];
    const optionValues = [q.option_a, q.option_b, q.option_c, q.option_d];
    const selected     = answers[q.id];

    const optionsHTML = optionLabels
      .filter((_, i) => optionValues[i])  // skip empty options (C and D are optional)
      .map(label => {
        const text       = optionValues[optionLabels.indexOf(label)];
        const isSelected = selected === label;
        return `
          <div class="option ${isSelected ? 'selected' : ''}" onclick="selectAnswer('${q.id}', '${label}', this)">
            <input type="radio" name="answer" value="${label}" ${isSelected ? 'checked' : ''} />
            <label><strong>${label}.</strong> ${text}</label>
          </div>
        `;
      }).join('');

    document.getElementById('options-list').innerHTML = optionsHTML;
  }

  // ── User selects an answer ────────────────────────────────
  function selectAnswer(questionId, answer, clickedEl) {
    // Save the answer
    answers[questionId] = answer;

    // Highlight selected option
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    clickedEl.classList.add('selected');

    // Update answered count
    document.getElementById('answered-count').textContent = Object.keys(answers).length;
  }

  // ── Navigate questions ────────────────────────────────────
  function nextQuestion() { if (currentIdx < questions.length - 1) showQuestion(currentIdx + 1); }
  function prevQuestion() { if (currentIdx > 0) showQuestion(currentIdx - 1); }

  // ── Timer ─────────────────────────────────────────────────
  function startTimer(minutes) {
    totalSeconds     = minutes * 60;
    let remaining    = totalSeconds;
    const fill       = document.getElementById('timer-fill');
    const display    = document.getElementById('timer-display');

    timerInterval = setInterval(() => {
      remaining--;
      display.textContent = toMMSS(remaining);
      fill.style.width    = `${(remaining / totalSeconds) * 100}%`;

      // Change color when time is running out
      fill.className    = 'timer-fill';
      display.className = 'timer-display';
      if (remaining <= 60)  { fill.classList.add('warn');   display.classList.add('warn');   }
      if (remaining <= 30)  { fill.classList.add('danger'); display.classList.add('danger'); }

      if (remaining <= 0) {
        clearInterval(timerInterval);
        alert('Time is up! Submitting your quiz now.');
        confirmSubmit();
      }
    }, 1000);
  }

  // ── Submit Quiz ───────────────────────────────────────────
  function submitQuiz() {
    const unanswered = questions.length - Object.keys(answers).length;
    document.getElementById('confirm-msg').textContent = unanswered > 0
      ? `You have ${unanswered} unanswered question(s). They will be marked wrong. Are you sure?`
      : 'You have answered all questions. Ready to submit?';
    document.getElementById('confirm-box').classList.remove('hidden');
  }

  function closeConfirm() {
    document.getElementById('confirm-box').classList.add('hidden');
  }

  async function confirmSubmit() {
    clearInterval(timerInterval);
    closeConfirm();

    const { ok, data } = await POST(`/quizzes/${quizId}/submit`, { answers });

    if (!ok) { alert('Could not submit. Try again.'); return; }

    // Save result to show on result page
    localStorage.setItem('lastResult', JSON.stringify(data));
    window.location.href = 'result.html';
  }

  // ── Warn user before closing tab ─────────────────────────
  window.onbeforeunload = () => 'Are you sure? Your quiz progress will be lost!';

  loadQuiz();
</script>
</body>
</html>
