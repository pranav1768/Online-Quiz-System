<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Create Quiz</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .question-block {
      border: 1px solid #ddd; border-radius: 10px;
      padding: 20px; margin-bottom: 16px; background: #fafbfc;
      position: relative;
    }
    .question-block h4 { font-size: 0.9rem; color: #3498db; margin-bottom: 14px; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .remove-btn {
      position: absolute; top: 14px; right: 14px;
      background: #fdecea; color: #e74c3c; border: none;
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.82rem;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <h1>Quiz<span>System</span> <span style="font-size:0.7rem;background:#3498db;color:white;padding:2px 8px;border-radius:4px;margin-left:6px">ADMIN</span></h1>
  <div class="navbar-links" id="navbar-user"></div>
</nav>

<div class="layout">
  <div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="quizzes.html">📝 Manage Quizzes</a>
    <a href="create-quiz.html" class="active">➕ Create Quiz</a>
    <a href="results.html">📊 All Results</a>
    <a href="users.html">👥 Users</a>
    <a href="javascript:logout()">🚪 Logout</a>
  </div>

  <div class="main">
    <div class="flex-between" style="margin-bottom:20px">
      <div>
        <p class="page-title">Create New Quiz</p>
        <p class="page-sub">Add quiz details and questions below</p>
      </div>
      <a href="quizzes.html" class="btn btn-gray">← Back</a>
    </div>

    <div id="msg" class="alert hidden"></div>

    <!-- Quiz Info -->
    <div class="card">
      <h3 style="margin-bottom:18px">Quiz Details</h3>
      <div class="form-group">
        <label class="form-label">Quiz Title *</label>
        <input id="title" type="text" class="form-input" placeholder="e.g. JavaScript Basics" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="desc" class="form-input" placeholder="What is this quiz about?"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label class="form-label">Time Limit (minutes)</label>
          <input id="time" type="number" class="form-input" value="10" min="1" max="120" />
        </div>
        <div class="form-group">
          <label class="form-label">Passing Score (%)</label>
          <input id="pass" type="number" class="form-input" value="60" min="1" max="100" />
        </div>
      </div>
    </div>

    <!-- Questions -->
    <div class="flex-between" style="margin-bottom:12px">
      <h3>Questions</h3>
      <button class="btn btn-blue btn-sm" onclick="addQuestion()">+ Add Question</button>
    </div>

    <div id="questions-list"></div>

    <div style="display:flex;gap:12px;margin-top:10px">
      <button class="btn btn-blue" onclick="addQuestion()">+ Add Question</button>
      <button class="btn btn-green" onclick="saveQuiz()">🚀 Create Quiz</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  requireAdmin();
  fillNavbar();

  let questionCount = 0;

  // Add a new question block to the form
  function addQuestion() {
    questionCount++;
    const num = questionCount;
    const div = document.createElement('div');
    div.className = 'question-block';
    div.id = `q${num}`;
    div.innerHTML = `
      <h4>Question ${num}</h4>
      <button class="remove-btn" onclick="removeQuestion('q${num}')">✕ Remove</button>

      <div class="form-group">
        <label class="form-label">Question Text *</label>
        <input type="text" class="form-input q-text" placeholder="Type your question here..." />
      </div>

      <div class="options-grid">
        <div class="form-group">
          <label class="form-label">Option A *</label>
          <input type="text" class="form-input q-opt-a" placeholder="Option A" />
        </div>
        <div class="form-group">
          <label class="form-label">Option B *</label>
          <input type="text" class="form-input q-opt-b" placeholder="Option B" />
        </div>
        <div class="form-group">
          <label class="form-label">Option C (optional)</label>
          <input type="text" class="form-input q-opt-c" placeholder="Option C" />
        </div>
        <div class="form-group">
          <label class="form-label">Option D (optional)</label>
          <input type="text" class="form-input q-opt-d" placeholder="Option D" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Correct Answer *</label>
        <select class="form-input q-correct">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>
      </div>
    `;
    document.getElementById('questions-list').appendChild(div);
  }

  function removeQuestion(id) {
    document.getElementById(id)?.remove();
  }

  // Collect all data and send to server
  async function saveQuiz() {
    const title = document.getElementById('title').value.trim();
    const desc  = document.getElementById('desc').value.trim();
    const time  = parseInt(document.getElementById('time').value);
    const pass  = parseInt(document.getElementById('pass').value);

    if (!title) { showMessage('msg', 'Please enter a quiz title.'); return; }

    // Collect all questions
    const blocks    = document.querySelectorAll('.question-block');
    if (blocks.length === 0) { showMessage('msg', 'Please add at least one question.'); return; }

    const questions = [];
    let valid = true;

    blocks.forEach((block, i) => {
      const question   = block.querySelector('.q-text').value.trim();
      const option_a   = block.querySelector('.q-opt-a').value.trim();
      const option_b   = block.querySelector('.q-opt-b').value.trim();
      const option_c   = block.querySelector('.q-opt-c').value.trim();
      const option_d   = block.querySelector('.q-opt-d').value.trim();
      const correct    = block.querySelector('.q-correct').value;

      if (!question || !option_a || !option_b) {
        showMessage('msg', `Question ${i + 1}: Please fill in the question and at least options A and B.`);
        valid = false; return;
      }

      questions.push({ question, option_a, option_b, option_c: option_c || null, option_d: option_d || null, correct_ans: correct });
    });

    if (!valid) return;

    const { ok, data } = await POST('/admin/quizzes', {
      title, description: desc, time_limit: time, pass_mark: pass, questions
    });

    if (!ok) { showMessage('msg', data.message); return; }

    showMessage('msg', 'Quiz created successfully! Redirecting...', 'green');
    setTimeout(() => window.location.href = 'quizzes.html', 1500);
  }

  // Start with 2 questions
  addQuestion();
  addQuestion();
</script>
</body>
</html>
