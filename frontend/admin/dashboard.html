<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav class="navbar">
  <h1>Quiz<span>System</span> <span style="font-size:0.7rem;background:#3498db;color:white;padding:2px 8px;border-radius:4px;margin-left:6px">ADMIN</span></h1>
  <div class="navbar-links" id="navbar-user"></div>
</nav>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="dashboard.html" class="active">🏠 Dashboard</a>
    <a href="quizzes.html">📝 Manage Quizzes</a>
    <a href="create-quiz.html">➕ Create Quiz</a>
    <a href="results.html">📊 All Results</a>
    <a href="users.html">👥 Users</a>
    <a href="javascript:logout()" style="margin-top:auto">🚪 Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main">
    <p class="page-title">Dashboard</p>
    <p class="page-sub">Welcome back! Here's what's happening.</p>

    <div id="loading" class="spinner-wrap"><div class="spinner"></div></div>

    <div id="main-content" class="hidden">

      <!-- Stats -->
      <div class="stats-grid" id="stats"></div>

      <!-- Recent Submissions -->
      <div class="card">
        <h3 style="margin-bottom:16px">Recent Submissions</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Student</th><th>Quiz</th><th>Score</th><th>Result</th><th>Date</th></tr>
            </thead>
            <tbody id="recent-rows"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  requireAdmin();
  fillNavbar();

  async function load() {
    const { ok, data } = await GET('/admin/dashboard');
    document.getElementById('loading').classList.add('hidden');
    if (!ok) { alert('Could not load dashboard.'); return; }

    document.getElementById('stats').innerHTML = `
      <div class="stat-box"><div class="stat-num">${data.totalStudents}</div><div class="stat-label">Students</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#3498db">${data.totalQuizzes}</div><div class="stat-label">Quizzes</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#27ae60">${data.totalAttempts}</div><div class="stat-label">Submissions</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#f39c12">${data.avgScore || 0}%</div><div class="stat-label">Avg Score</div></div>
    `;

    document.getElementById('recent-rows').innerHTML = data.recentResults.length === 0
      ? '<tr><td colspan="5" style="text-align:center;color:#888;padding:20px">No submissions yet.</td></tr>'
      : data.recentResults.map(r => `
          <tr>
            <td><strong>${r.name}</strong></td>
            <td>${r.title}</td>
            <td><strong style="color:${r.passed ? '#27ae60' : '#e74c3c'}">${parseFloat(r.percent).toFixed(1)}%</strong></td>
            <td><span class="badge ${r.passed ? 'badge-green' : 'badge-red'}">${r.passed ? 'Passed' : 'Failed'}</span></td>
            <td style="color:#888;font-size:0.82rem">${new Date(r.taken_at).toLocaleDateString('en-IN')}</td>
          </tr>
        `).join('');

    document.getElementById('main-content').classList.remove('hidden');
  }

  load();
</script>

</body>
</html>
