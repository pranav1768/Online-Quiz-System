<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — All Results</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav class="navbar">
  <h1>Quiz<span>System</span> <span style="font-size:0.7rem;background:#3498db;color:white;padding:2px 8px;border-radius:4px;margin-left:6px">ADMIN</span></h1>
  <div class="navbar-links" id="navbar-user"></div>
</nav>

<div class="layout">
  <div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="quizzes.html">📝 Manage Quizzes</a>
    <a href="create-quiz.html">➕ Create Quiz</a>
    <a href="results.html" class="active">📊 All Results</a>
    <a href="users.html">👥 Users</a>
    <a href="javascript:logout()">🚪 Logout</a>
  </div>

  <div class="main">
    <p class="page-title">All Results</p>
    <p class="page-sub">Every quiz submission from all students</p>

    <div id="loading" class="spinner-wrap"><div class="spinner"></div></div>

    <div class="card hidden" id="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Student</th><th>Quiz</th><th>Score</th><th>Result</th><th>Date</th></tr>
          </thead>
          <tbody id="result-rows"></tbody>
        </table>
      </div>
    </div>

    <div id="empty" class="card text-center hidden">
      <p style="color:#888;padding:20px">No results yet. Students haven't taken any quizzes.</p>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  requireAdmin();
  fillNavbar();

  async function load() {
    const { ok, data } = await GET('/admin/results');
    document.getElementById('loading').classList.add('hidden');
    if (!ok) { alert('Could not load results.'); return; }

    const results = data.results;
    if (results.length === 0) { document.getElementById('empty').classList.remove('hidden'); return; }

    document.getElementById('result-rows').innerHTML = results.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>
          <strong>${r.name}</strong>
          <div style="font-size:0.78rem;color:#888">${r.email}</div>
        </td>
        <td>${r.title}</td>
        <td>
          <strong style="color:${r.passed ? '#27ae60' : '#e74c3c'}">${parseFloat(r.percent).toFixed(1)}%</strong>
          <span style="color:#888;font-size:0.8rem"> (${r.score}/${r.total})</span>
        </td>
        <td><span class="badge ${r.passed ? 'badge-green' : 'badge-red'}">${r.passed ? 'Passed' : 'Failed'}</span></td>
        <td style="color:#888;font-size:0.82rem">${new Date(r.taken_at).toLocaleDateString('en-IN')}</td>
      </tr>
    `).join('');

    document.getElementById('table-card').classList.remove('hidden');
  }

  load();
</script>

</body>
</html>
