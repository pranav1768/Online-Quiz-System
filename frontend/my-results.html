<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz System — My Results</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <h1>Quiz<span>System</span></h1>
  <div class="navbar-links" id="navbar-user">
    <a href="dashboard.html">← Dashboard</a>
  </div>
</nav>

<div class="container">
  <p class="page-title">My Results</p>
  <p class="page-sub">All your past quiz attempts</p>

  <div id="loading" class="spinner-wrap"><div class="spinner"></div></div>

  <!-- Stats -->
  <div id="stats" class="stats-grid hidden"></div>

  <!-- Results Table -->
  <div id="table-wrap" class="card hidden">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Quiz</th>
            <th>Score</th>
            <th>Result</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="results-rows"></tbody>
      </table>
    </div>
  </div>

  <div id="empty" class="card text-center hidden">
    <p style="color:#888;padding:20px">You haven't taken any quizzes yet.</p>
    <a href="dashboard.html" class="btn btn-blue">Take a Quiz</a>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  requireLogin();
  fillNavbar();

  async function loadResults() {
    const { ok, data } = await GET('/my-results');
    document.getElementById('loading').classList.add('hidden');

    if (!ok || data.results.length === 0) {
      document.getElementById('empty').classList.remove('hidden');
      return;
    }

    const results = data.results;

    // Calculate quick stats
    const passed  = results.filter(r => r.passed).length;
    const avg     = (results.reduce((sum, r) => sum + parseFloat(r.percent), 0) / results.length).toFixed(1);

    document.getElementById('stats').innerHTML = `
      <div class="stat-box"><div class="stat-num">${results.length}</div><div class="stat-label">Total Attempts</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#27ae60">${passed}</div><div class="stat-label">Passed</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#e74c3c">${results.length - passed}</div><div class="stat-label">Failed</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#3498db">${avg}%</div><div class="stat-label">Average Score</div></div>
    `;
    document.getElementById('stats').classList.remove('hidden');

    // Build table rows
    document.getElementById('results-rows').innerHTML = results.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${r.quiz_title}</strong></td>
        <td>
          <strong style="color:${r.passed ? '#27ae60' : '#e74c3c'}">${parseFloat(r.percent).toFixed(1)}%</strong>
          <span style="color:#888;font-size:0.8rem"> (${r.score}/${r.total})</span>
        </td>
        <td><span class="badge ${r.passed ? 'badge-green' : 'badge-red'}">${r.passed ? 'Passed' : 'Failed'}</span></td>
        <td style="color:#888;font-size:0.85rem">${new Date(r.taken_at).toLocaleDateString('en-IN')}</td>
      </tr>
    `).join('');

    document.getElementById('table-wrap').classList.remove('hidden');
  }

  loadResults();
</script>
</body>
</html>
