<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz System — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <h1>Quiz<span>System</span></h1>
  <div class="navbar-links" id="navbar-user">
    <a href="my-results.html">My Results</a>
  </div>
</nav>

<!-- Page Content -->
<div class="container">
  <p class="page-title" id="greeting">Available Quizzes</p>
  <p class="page-sub">Pick a quiz below and test your knowledge!</p>

  <!-- Loading spinner -->
  <div id="loading" class="spinner-wrap"><div class="spinner"></div></div>

  <!-- Quizzes will appear here -->
  <div id="quiz-grid" class="quiz-grid hidden"></div>

  <!-- Message if no quizzes -->
  <div id="empty" class="card text-center hidden">
    <p style="color:#888;padding:20px">No quizzes available right now. Check back later!</p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  requireLogin();
  fillNavbar();

  // Greet the user
  const user = getUser();
  document.getElementById('greeting').textContent = `Hello, ${user.name}! 👋`;

  // Load quizzes from server
  async function loadQuizzes() {
    const { ok, data } = await GET('/quizzes');
    document.getElementById('loading').classList.add('hidden');

    if (!ok) { alert('Could not load quizzes.'); return; }

    const quizzes = data.quizzes;

    if (quizzes.length === 0) {
      document.getElementById('empty').classList.remove('hidden');
      return;
    }

    // Build quiz cards
    const grid = document.getElementById('quiz-grid');
    grid.classList.remove('hidden');
    grid.innerHTML = quizzes.map(q => `
      <div class="quiz-card">
        <h3>${q.title}</h3>
        <p>${q.description || 'No description.'}</p>
        <div class="quiz-meta">
          <span class="meta-tag">⏱ ${q.time_limit} mins</span>
          <span class="meta-tag orange">❓ ${q.total_questions} questions</span>
          <span class="meta-tag green">✅ Pass: ${q.pass_mark}%</span>
        </div>
        <a href="quiz.html?id=${q.id}" class="btn btn-blue btn-full">Start Quiz</a>
      </div>
    `).join('');
  }

  loadQuizzes();
</script>

</body>
</html>
